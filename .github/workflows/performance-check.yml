name: 14-Tage Performance Check

on:
  schedule:
    # 06:00 UTC = 08:00 MESZ Mo-Fr
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install yfinance httpx

      - name: Check performance
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/check_performance.py

      - name: Commit updated signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/signals.json
          git diff --staged --quiet || git commit -m "chore: remove processed signals $(date +%Y-%m-%d)"
          git push
