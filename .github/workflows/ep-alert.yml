name: EP Scanner (täglich 22 Uhr MESZ)

on:
  schedule:
    # 20:00 UTC = 22:00 MESZ Mo-Fr
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ep-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install yfinance httpx

      - name: Trigger EP Alert
        run: |
          curl -s -X POST \
            "https://stocks-backtest-api-production-0c6a.up.railway.app/ep/alert" \
            --max-time 120 \
            -o /tmp/result.json \
            -w "\nHTTP %{http_code}\n"

      - name: Save signals
        run: python3 scripts/save_signals.py --source EP --file /tmp/result.json

      - name: Commit signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/signals.json
          git diff --staged --quiet || git commit -m "chore: EP signals $(date +%Y-%m-%d)"
          git push
